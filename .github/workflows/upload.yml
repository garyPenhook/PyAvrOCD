name: Upload

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Where are we
        run: |
          pwd
          ls -la  extras/avrocd-tools

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: extras/avrocd-tools
          target-folder: avrocd-tools

      - name: Asset upload
        uses: softprops/action-gh-release@v2
        with:
          files: extras/assets/*.tar.gz

