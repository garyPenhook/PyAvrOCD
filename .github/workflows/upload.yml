name: Upload

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Asset upload
        uses: softprops/action-gh-releases@v2
        with:
          files: extras/assets/*.tar.gz