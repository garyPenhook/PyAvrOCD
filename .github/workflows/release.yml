# Triggered by a new release, it will do a basic check on version number and unit tests.
# Then it will build the binaries and creates the binary release assets and the downloadable tools for Arduino
# Finally, it will upload the new version to PyPI
name: Release workflow

on:
  release:
    types: [published]
  workflow_dispatch: # to run it manually

permissions:                    # Global permissions configuration starts here
  contents: write               # 'write' access to repository contents
  pull-requests: write          # 'write' access to pull requests

jobs:
  check:
    defaults:
      run:
        shell: bash
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # Install dependencies

      - name: Test tag against system version
        run: |
          VER=$(python pyavrocd/main.py -V)
          VERSTRING=v${VER#*version }
          TAG_NAME=${{ github.event.release.tag_name }}
          echo "System version string: $VERSTRING"
          echo "Github tag: $TAG_NAME"
          if [ "x$TAG_NAME" == "xmain" ]; then
             TAG_NAME=$VERSTRING
             echo "Adapted GitHub tag name to system version string"
          fi
          if [ "x$VERSTRING" != "x$TAG_NAME" ]; then
             echo "Release version does not match system version"
             exit 1
          fi
          echo "Release and system version are identical, now we continue"

      - name: Run unit-tests
        run: |
          pytest

  build-binaries:
    needs: check
    strategy:
      matrix:
      # If you change something in the list of OSs, you also have to do it further down!
       os: [ "ubuntu-22.04", "macos-13", "windows-2022",  "ubuntu-22.04-arm",  "macos-14" ]
      max-parallel: 1 # work on the jobs sequentially because otherwise the push will fail
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - name: Wait before checkout
        run: sleep 4

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # Install dependencies

      - name: Package PyAvrOCD with PyInstaller
        run: |
          pyinstaller -y pyavrocd.spec

      - name: Move to binaries and register for commit (macOS ARM = macos-14)
        if: matrix.os == 'macos-14'
        run: |
          rm -rf extras/binaries/arm64-apple-darwin/pyavrocd*
          mv dist/pyavrocd/* extras/binaries/arm64-apple-darwin/
          git add extras/binaries/arm64-apple-darwin/pyavrocd
          git add extras/binaries/arm64-apple-darwin/pyavrocd-util/

      - name: Move to binaries and register for commit (Linux Arm = ubuntu-22.04-arm)
        if: matrix.os == 'ubuntu-22.04-arm'
        run: |
          rm -rf extras/binaries/aarch64-linux-gnu/pyavrocd*
          mv dist/pyavrocd/* extras/binaries/aarch64-linux-gnu/
          git add extras/binaries/aarch64-linux-gnu/pyavrocd
          git add extras/binaries/aarch64-linux-gnu/pyavrocd-util/

      - name: Move to binaries and register for commit (Windows Intel = windows-2022)
        if: matrix.os == 'windows-2022'
        run: |
          rm -rf extras/binaries/x86_64-mingw32/pyavrocd*
          mv dist/pyavrocd/* extras/binaries/x86_64-mingw32/
          git add extras/binaries/x86_64-mingw32/pyavrocd.exe
          git add extras/binaries/x86_64-mingw32/pyavrocd-util/

      - name: Move to binaries and register for commit (macOS Intel = macos-13)
        if: matrix.os == 'macos-13'
        run: |
          rm -rf extras/binaries/x86_64-apple-darwin/pyavrocd*
          mv dist/pyavrocd/* extras/binaries/x86_64-apple-darwin/
          git add extras/binaries/x86_64-apple-darwin/pyavrocd
          git add extras/binaries/x86_64-apple-darwin/pyavrocd-util/

      - name: Move to binaries and register for commit (Linux Intel = ubuntu-22.04)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          rm -rf extras/binaries/x86_64-linux-gnu/pyavrocd*
          mv dist/pyavrocd/* extras/binaries/x86_64-linux-gnu/
          git add extras/binaries/x86_64-linux-gnu/pyavrocd
          git add extras/binaries/x86_64-linux-gnu/pyavrocd-util/

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Add build changes"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: 'main'

  upload:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Packing
        run: bash packer.sh

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: extras/avrocd-tools
          target-folder: avrocd-tools

      - name: Asset upload
        uses: softprops/action-gh-release@v2
        with:
          files: extras/assets/*.tar.gz

      - name: Clean build directories
        run: |
          git rm -r --force extras/binaries/aarch64-linux-gnu/pyavrocd*
          git rm -r --force extras/binaries/arm64-apple-darwin/pyavrocd*
          git rm -r --force extras/binaries/x86_64-apple-darwin/pyavrocd*
          git rm -r --force extras/binaries/x86_64-linux-gnu/pyavrocd*
          git rm -r --force extras/binaries/x86_64-mingw32/pyavrocd*

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Clean build folders"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: 'main'
          force: true
          atomic: false

  build-pypi-distribution:
    name: Build distribution
    needs: upload
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: >-
      Publish Python distribution to PyPI
    needs:
    - build-pypi-distribution
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/PyAvrOCD  # Replace <package-name> with your PyPI project name
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/