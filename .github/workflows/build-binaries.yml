# This workflow will generate six executables that one access as artifacts of the workflow run
name: Build binaries

on:
  workflow_dispatch: # to run it manually

jobs:
  build-binaries:
    strategy:
      matrix:
      # If you change something in the list of OSs, you also have to do it further down!
       os: [ "ubuntu-22.04", "macos-14-intel", "windows-2022",  "windows-2025", "ubuntu-22.04-arm",  "macos-14" ]
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python-64-bit
        if: matrix.os != 'windows-2022'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Python-32-bit
        if matrix.os == 'windows-2022'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x86'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .  # Install dependencies

      - name: Package PyAvrOCD with PyInstaller
        run: |
          pyinstaller -y pyavrocd.spec

      - name: Upload as artifact (macOS ARM = macos-14)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: arm64-apple-darwin
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Upload as artifact (Linux Arm = ubuntu-22.04-arm)
        if: matrix.os == 'ubuntu-22.04-arm'
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-linux-gnu
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Upload artifact (Windows Intel (64-bit) = windows-2025)
        if: matrix.os == 'windows-2025'
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-mingw32
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Upload artifact (Windows Intel (32-bit) = windows-2022)
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: i686-mingw32
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Upload artifact (macOS Intel = macos-14-intel)
        if: matrix.os == 'macos-14-intel'
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

      - name: Upload artifact (Linux Intel = ubuntu-22.04)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-linux-gnu
          path: dist/pyavrocd/*
          overwrite: true
          include-hidden-files: true
