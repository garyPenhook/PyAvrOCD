name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Install dependencies
      run: uv sync
    - name: Analysing the code with pylint
      # Lint the package using the project's pylint config in pyproject.toml,
      # which excludes the generated device files; mirrors the pre-commit gate.
      run: |
        uv run pylint -rn -sn \
          --ignore-pattern='((attiny|atmega|at90|avr16|avr32|avr64|avr128|avr256).*\.py)' \
          --ignore=harvest.py,alldevices.py,collect.py \
          --disable=similarities,import-error \
          pyavrocd
