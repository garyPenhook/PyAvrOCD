name: Deploy workflow

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # to run it manually

jobs:
  checkTagAndUnitTests:
    defaults:
      run:
        shell: bash
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Load cached venv
        id: cached-pip-wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Install library
        run: poetry install --no-interaction
      - name: Test tag against system version
        run: |
          VER=$(poetry run pyavrocd -V)
          VERSTRING=v${VER#*version }
          echo "System version string: $VERSTRING"
          echo "Github tag: $GITHUB_REF_NAME"
	  if [ "x$GITHUB_REF_NAME" == "xmain" ]; then
	     GITHUB_REF_NAME=$VERSTRING
	     echo "Adapted GitHub tag name to system version string"
	  fi
          if [ "x$VERSTRING" != "x$GITHUB_REF_NAME" ]; then
             echo "Release version does not match system version"
             exit 1
          fi
          echo "Release and system version are identical, now we continue"
      - name: Run unit-tests
        run: |
          source $VENV
          pytest